<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无损平方集团 | Lossless Square</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="geek-bg"></div>

    <div class="container">
        <header class="profile-card">
            <div class="avatar-container">
                <div class="avatar-circle">
                    <img src="images/iseri.gif" alt="Avatar" onerror="this.style.display='none';">
                </div>
                <span class="status-badge">ONLINE</span>
            </div>

            <div class="profile-info">
                <h1 class="welcome-text">你好，我是 <span class="gradient-name">三月小芹菜</span></h1>
                
                <div class="tips-container" id="random-tips" title="点击刷新切句">
                    <span class="tips-prefix">SYSTEM_LOG //</span>
                    <span id="tips-content">正在载入系统日志...</span>
                </div>

                <div class="social-links">
                    <a href="https://github.com/tomh500" target="_blank" class="link-btn github">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                    <a href="https://space.bilibili.com/511242952" target="_blank" class="link-btn bilibili">
                        <i class="fa-brands fa-bilibili"></i> Bilibili
                    </a>
                    <a href="https://discord.gg/MvuaUfwyQ9" target="_blank" class="link-btn discord">
                        <i class="fa-brands fa-discord"></i> Discord
                    </a>
                </div>
            </div>
        </header>

        <section class="music-player">
            <div class="track-meta">
                <div class="track-title">时间日记</div>
                <div class="track-artist">洛天依</div>
                <div class="progress-bar-container" id="progress-container">
                    <div class="progress-bar" id="progress"></div>
                </div>
            </div>
            <div class="player-controls">
                <button id="play-btn" class="ctrl-btn">PLAY</button>
            </div>
            <audio id="bgm" src="bgm.ogg" loop></audio>
        </section>

        <main class="product-grid">
            <h2>// 核心项目矩阵</h2>
            
            <div class="product-card" data-type="link" data-target="https://tomh500.github.io/DearMoments">
                <div class="prod-img-wrapper">
                    <img src="images/dearmoments.png" alt="DearNextgen">
                </div>
                <div class="prod-details">
                    <h3>DearNextgen</h3>
                    <p>下一代CS2 CFG，完全合法地获取游戏优势。</p>
                    <span class="action-tag text-link">访问站点 →</span>
                </div>
            </div>

            <div class="product-card" id="ccd-manager-card" data-type="download">
                <div class="prod-img-wrapper">
                    <img src="images/ccdmanager.png" alt="CCD Manager">
                </div>
                <div class="prod-details">
                    <h3>CCD Manager</h3>
                    <p>免费无广告的CPU调度管理软件，充分利用您的Ryzen9 9950X3D。Process Lasso 理想平替。</p>
                    <span class="action-tag text-download">获取下载 ↓</span>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="download-modal">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">SELECT_DOWNLOAD_ROUTE</span>
                <button class="close-btn" id="close-modal">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-prod-name">CCD Manager</p>
                <div class="route-list" id="route-container">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
